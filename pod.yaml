apiVersion: v1
kind: Pod
metadata:
  name: node-app-pod
  labels:
    app: node-app
spec:
  containers:
    - name: node-app
      image: anshulgadia26/node-app:latest
      ports:
        - containerPort: 3000
      env:
        - name: PORT
          value: "3000"
      resources:
        requests:
          memory: "64Mi"
          cpu: "100m"
        limits:
          memory: "128Mi"
          cpu: "200m"
  restartPolicy: Always
